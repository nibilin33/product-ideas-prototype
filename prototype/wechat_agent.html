<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>微信成交助手 · 餐饮私域版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      * {
        box-sizing: border-box;
      }

      /* 参考 demo/AI工作台.html：深邃太空 + 星光 */
      .bg-shell {
        position: relative;
        background: radial-gradient(ellipse 1200px 600px at 50% 50%, rgba(16, 185, 129, 0.03), transparent 70%),
          radial-gradient(circle 800px at 80% 20%, rgba(34, 211, 238, 0.08), transparent 60%),
          radial-gradient(circle 600px at 20% 80%, rgba(16, 185, 129, 0.06), transparent 50%),
          linear-gradient(180deg, #0a0f14 0%, #050809 50%, #020304 100%);
        overflow-x: hidden;
      }

      .bg-shell::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: radial-gradient(circle, rgba(52, 211, 153, 0.8) 1px, transparent 1px),
          radial-gradient(circle, rgba(34, 211, 238, 0.6) 1px, transparent 1px),
          radial-gradient(circle, rgba(255, 255, 255, 0.9) 1.5px, transparent 1.5px),
          radial-gradient(circle, rgba(52, 211, 153, 0.4) 0.5px, transparent 0.5px),
          radial-gradient(circle, rgba(34, 211, 238, 0.3) 0.5px, transparent 0.5px);
        background-size: 550px 550px, 350px 350px, 450px 450px, 250px 250px, 200px 200px;
        background-position: 0 0, 40px 60px, 130px 270px, 70px 100px, 150px 200px;
        animation: cosmicDrift 180s linear infinite;
        pointer-events: none;
        z-index: 1;
      }

      @keyframes cosmicDrift {
        0% {
          transform: translate(0, 0) scale(1);
          opacity: 0.6;
        }
        33% {
          opacity: 0.8;
        }
        66% {
          opacity: 0.7;
        }
        100% {
          transform: translate(-200px, -100px) scale(1.05);
          opacity: 0.6;
        }
      }

      .bg-shell::after {
        content: "";
        position: fixed;
        inset: 0;
        background-image: radial-gradient(circle, rgba(255, 255, 255, 0.9) 1px, transparent 1px),
          radial-gradient(circle, rgba(52, 211, 153, 0.8) 1px, transparent 1px),
          radial-gradient(circle, rgba(34, 211, 238, 0.7) 1px, transparent 1px);
        background-size: 800px 800px, 600px 600px, 700px 700px;
        background-position: 50px 50px, 250px 150px, 400px 300px;
        animation: starTwinkle 3s ease-in-out infinite;
        pointer-events: none;
        z-index: 1;
      }

      @keyframes starTwinkle {
        0%,
        100% {
          opacity: 0.3;
        }
        50% {
          opacity: 0.8;
        }
      }

      /* 参考 demo/AI工作台.html：玻璃描边卡片 */
      .gstroke {
        position: relative;
        border-radius: 18px;
        background: radial-gradient(120% 85% at 18% 8%, rgba(52, 211, 153, 0.1) 0%, rgba(34, 211, 238, 0.05) 42%, rgba(0, 0, 0, 0) 72%),
          rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(10px);
      }

      .gstroke::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        padding: 1px;
        background: linear-gradient(135deg, rgba(52, 211, 153, 0.22) 0%, rgba(34, 211, 238, 0.14) 45%, rgba(16, 185, 129, 0.06) 100%);
        -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
        mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
        opacity: 0.55;
        filter: blur(0.2px);
      }

      /* 主 Tab 下划线（与 demo/AI工作台.html 一致） */
      .main-tab.active {
        position: relative;
        color: rgba(52, 211, 153, 0.95);
      }

      .main-tab.active::after {
        content: "";
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        bottom: -10px;
        width: 84px;
        height: 4px;
        border-radius: 9999px;
        background: linear-gradient(90deg, rgba(52, 211, 153, 0.95), rgba(34, 211, 238, 0.25));
        box-shadow: 0 0 18px rgba(52, 211, 153, 0.18);
      }

      /* ===== Buttons (aligned with demo/AI工作台.html) ===== */
      .btn-primary {
        height: 44px;
        padding: 0 18px;
        border-radius: 12px;
        font-weight: 900;
        color: #fff;
        background: linear-gradient(135deg, #34d399, #34d399);
        box-shadow: 0 4px 16px rgba(52, 211, 153, 0.3);
        border: none;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        font-size: 15px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        position: relative;
        overflow: hidden;
      }

      .btn-primary::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), transparent);
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      .btn-primary:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(52, 211, 153, 0.5), 0 0 40px rgba(52, 211, 153, 0.3);
      }

      .btn-primary:hover:not(:disabled)::before {
        opacity: 1;
      }

      .btn-primary:active:not(:disabled) {
        transform: translateY(0);
        box-shadow: 0 2px 8px rgba(52, 211, 153, 0.4);
      }

      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        box-shadow: none;
      }

      .btn-secondary {
        height: 44px;
        padding: 0 18px;
        border-radius: 12px;
        font-weight: 700;
        color: rgba(244, 244, 245, 0.9);
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        cursor: pointer;
        transition: all 0.3s ease;
        font-size: 15px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .btn-secondary:hover:not(:disabled) {
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(52, 211, 153, 0.4);
        box-shadow: 0 0 16px rgba(52, 211, 153, 0.2);
      }

      .btn-secondary:active:not(:disabled) {
        transform: scale(0.98);
      }

      .btn-primary:focus-visible,
      .btn-secondary:focus-visible {
        outline: 3px solid rgba(52, 211, 153, 0.16);
        outline-offset: 2px;
      }

      .btn-sm {
        height: 40px;
        padding: 0 14px;
        font-size: 14px;
      }

      .btn-pill {
        height: 34px;
        padding: 0 12px;
        border-radius: 9999px;
        font-weight: 900;
        font-size: 12px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.10);
        color: rgba(244, 244, 245, 0.9);
        cursor: pointer;
        transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease;
      }

      .btn-pill:hover:not(:disabled) {
        transform: translateY(-1px);
        background: rgba(255, 255, 255, 0.07);
        box-shadow: 0 18px 36px rgba(0, 0, 0, 0.6);
      }

      .btn-pill:focus-visible {
        outline: 3px solid rgba(52, 211, 153, 0.12);
        outline-offset: 2px;
      }

      .btn-pill--cyan {
        background: rgba(34, 211, 238, 0.10);
        border-color: rgba(34, 211, 238, 0.30);
        color: rgba(34, 211, 238, 0.95);
      }

      .feedback-toast {
        position: fixed;
        left: 50%;
        bottom: 28px;
        transform: translateX(-50%) translateY(16px);
        z-index: 80;
        min-width: 240px;
        max-width: calc(100vw - 32px);
        padding: 12px 16px;
        border-radius: 14px;
        background: rgba(5, 8, 9, 0.86);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(52, 211, 153, 0.24);
        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.42);
        color: rgba(244, 244, 245, 0.94);
        font-size: 13px;
        font-weight: 700;
        line-height: 1.5;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.28s ease, transform 0.28s ease;
      }

      .feedback-toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      .sim-loading-dot {
        width: 8px;
        height: 8px;
        border-radius: 9999px;
        background: rgba(34, 211, 238, 0.95);
        box-shadow: 0 0 18px rgba(34, 211, 238, 0.45);
        animation: simPulse 1s ease-in-out infinite;
      }

      .sim-loading-bar {
        position: relative;
        overflow: hidden;
      }

      .sim-loading-bar::after {
        content: "";
        position: absolute;
        inset: 0;
        transform: translateX(-100%);
        background: linear-gradient(90deg, transparent 0%, rgba(34, 211, 238, 0.55) 50%, transparent 100%);
        animation: simSweep 1.1s ease-in-out infinite;
      }

      @keyframes simPulse {
        0%, 100% { transform: scale(0.9); opacity: 0.65; }
        50% { transform: scale(1.1); opacity: 1; }
      }

      @keyframes simSweep {
        100% { transform: translateX(100%); }
      }

      /* ===== Segmented tabs (focus core, reduce density) ===== */
      .seg-wrap {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px;
        max-width: 100%;
        min-width: 0;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.04);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(10px);
        overflow: hidden;
      }

      .seg {
        display: inline-flex;
        gap: 6px;
        max-width: 100%;
        min-width: 0;
        overflow-x: auto;
        overscroll-behavior-x: contain;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }

      .seg::-webkit-scrollbar {
        height: 0;
        display: none;
      }

      .seg-btn {
        height: 34px;
        padding: 0 12px;
        border-radius: 12px;
        font-weight: 900;
        font-size: 12px;
        color: rgba(244, 244, 245, 0.78);
        white-space: nowrap;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.02);
        transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, border-color 0.18s ease;
        display: inline-flex;
        align-items: center;
        flex: 0 0 auto;
        gap: 8px;
      }

      .seg-btn svg {
        width: 18px;
        height: 18px;
        flex: 0 0 auto;
        opacity: 0.92;
      }

      .seg-btn:hover {
        transform: translateY(-1px);
        border-color: rgba(52, 211, 153, 0.25);
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.5);
      }

      .seg-btn.active {
        color: rgba(10, 20, 18, 0.98);
        background: rgba(52, 211, 153, 0.95);
        border-color: rgba(52, 211, 153, 0.65);
        box-shadow: 0 18px 38px rgba(0, 0, 0, 0.55);
      }

      .seg-btn:focus-visible {
        outline: 3px solid rgba(52, 211, 153, 0.14);
        outline-offset: 2px;
      }

      .panel[hidden] {
        display: none;
      }

      /* ===== Guided stepper (make intent obvious) ===== */
      .howto {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
      }

      .stepper {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .step {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 16px;
        background: rgba(0, 0, 0, 0.22);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.10);
      }

      .step .n {
        width: 28px;
        height: 28px;
        border-radius: 9999px;
        display: grid;
        place-items: center;
        font-weight: 900;
        font-size: 12px;
        color: rgba(244, 244, 245, 0.82);
        background: rgba(255, 255, 255, 0.06);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.10);
        flex-shrink: 0;
      }

      .step .t {
        font-weight: 900;
        font-size: 12px;
        color: rgba(244, 244, 245, 0.92);
        line-height: 1.1;
      }

      .step .d {
        margin-top: 2px;
        font-size: 11px;
        color: rgba(244, 244, 245, 0.55);
        line-height: 1.2;
      }

      .step.active {
        background: radial-gradient(120% 85% at 18% 8%, rgba(52, 211, 153, 0.16) 0%, rgba(34, 211, 238, 0.08) 42%, rgba(0, 0, 0, 0) 72%),
          rgba(255, 255, 255, 0.03);
        box-shadow: inset 0 0 0 1px rgba(52, 211, 153, 0.22), 0 18px 40px rgba(0, 0, 0, 0.55);
      }

      .step.active .n {
        color: rgba(10, 20, 18, 0.98);
        background: rgba(52, 211, 153, 0.95);
        box-shadow: 0 0 18px rgba(52, 211, 153, 0.18);
      }

      .helper {
        max-width: 260px;
        font-size: 12px;
        line-height: 1.6;
        color: rgba(244, 244, 245, 0.62);
      }

      .helper b {
        color: rgba(244, 244, 245, 0.92);
        font-weight: 900;
      }

      /* ===== Deal assistant UI (keep existing layout) ===== */
      .wda-chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 9999px;
        font-size: 12px;
        font-weight: 900;
        border: 1px solid rgba(255, 255, 255, 0.10);
        background: rgba(255, 255, 255, 0.04);
        color: rgba(244, 244, 245, 0.78);
        white-space: nowrap;
      }

      .wda-chip--ok {
        border-color: rgba(52, 211, 153, 0.22);
        background: rgba(52, 211, 153, 0.10);
        color: rgba(190, 255, 232, 0.95);
      }

      .wda-chip--cyan {
        border-color: rgba(34, 211, 238, 0.22);
        background: rgba(34, 211, 238, 0.10);
        color: rgba(190, 248, 255, 0.92);
      }

      .wda-chip--warn {
        border-color: rgba(240, 179, 72, 0.22);
        background: rgba(240, 179, 72, 0.10);
        color: rgba(255, 228, 175, 0.92);
      }

      .wda-chip--danger {
        border-color: rgba(222, 79, 133, 0.20);
        background: rgba(222, 79, 133, 0.10);
        color: rgba(255, 199, 220, 0.92);
      }

      .wda-item {
        border-radius: 18px;
        padding: 12px 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.03);
        cursor: pointer;
        transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease;
      }

      .wda-item:hover {
        transform: translateY(-1px);
        border-color: rgba(52, 211, 153, 0.22);
        background: rgba(255, 255, 255, 0.04);
        box-shadow: 0 18px 36px rgba(0, 0, 0, 0.6);
      }

      .wda-feedback-card {
        border-radius: 18px;
        padding: 12px;
        border: 1px solid rgba(52, 211, 153, 0.18);
        background: radial-gradient(120% 85% at 12% 0%, rgba(52, 211, 153, 0.12), transparent 62%),
          rgba(255, 255, 255, 0.035);
      }

      .wda-feedback-q {
        font-size: 13px;
        line-height: 1.55;
        font-weight: 900;
        color: rgba(244, 244, 245, 0.94);
      }

      .wda-feedback-meta {
        margin-top: 4px;
        font-size: 11px;
        line-height: 1.5;
        color: rgba(244, 244, 245, 0.55);
      }

      .wda-feedback-actions {
        margin-top: 10px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .wda-feedback-btn {
        min-height: 34px;
        padding: 0 11px;
        border-radius: 9999px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.05);
        color: rgba(244, 244, 245, 0.88);
        font-size: 12px;
        font-weight: 900;
        cursor: pointer;
      }

      .wda-feedback-btn:hover {
        border-color: rgba(52, 211, 153, 0.28);
        background: rgba(52, 211, 153, 0.1);
      }

      .wda-feedback-value {
        margin-top: 10px;
        border-radius: 14px;
        padding: 10px;
        background: rgba(0, 0, 0, 0.18);
        border: 1px dashed rgba(255, 255, 255, 0.1);
        font-size: 11px;
        line-height: 1.6;
        color: rgba(244, 244, 245, 0.62);
      }

      .wda-input,
      .wda-select,
      .wda-textarea {
        width: 100%;
        border-radius: 16px;
        padding: 10px 12px;
        border: 1px solid rgba(255, 255, 255, 0.10);
        background: rgba(0, 0, 0, 0.22);
        color: rgba(244, 244, 245, 0.88);
        outline: none;
      }

      .wda-input:focus,
      .wda-select:focus,
      .wda-textarea:focus {
        border-color: rgba(52, 211, 153, 0.35);
        box-shadow: 0 0 0 3px rgba(52, 211, 153, 0.10);
      }

      .wda-input[type="date"]::-webkit-calendar-picker-indicator {
        filter: invert(1);
        opacity: 0.75;
      }

      .wda-textarea {
        min-height: 112px;
        resize: vertical;
        line-height: 1.6;
      }

      .wda-overlay {
        position: fixed;
        inset: 0;
        z-index: 90;
        background: rgba(0, 0, 0, 0.62);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.22s ease;
      }

      .wda-overlay.show {
        opacity: 1;
        pointer-events: all;
      }

      .wda-drawer {
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        bottom: -110%;
        z-index: 100;
        width: min(580px, calc(100vw - 32px));
        max-height: 84vh;
        overflow: auto;
        border-radius: 22px 22px 0 0;
        background: rgba(5, 8, 9, 0.92);
        backdrop-filter: blur(18px);
        border: 1px solid rgba(255, 255, 255, 0.10);
        box-shadow: 0 30px 90px rgba(0, 0, 0, 0.78);
        transition: bottom 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      .wda-drawer.show {
        bottom: 0;
      }

      .wda-handle {
        height: 5px;
        width: 46px;
        border-radius: 9999px;
        background: rgba(255, 255, 255, 0.14);
        margin: 10px auto 6px;
      }

      .wda-modal-wrap {
        position: fixed;
        inset: 0;
        z-index: 110;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 18px;
        background: rgba(0, 0, 0, 0.68);
      }

      .wda-modal-wrap.show {
        display: flex;
      }

      .wda-modal {
        width: min(560px, 100%);
        border-radius: 22px;
        background: rgba(5, 8, 9, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.10);
        backdrop-filter: blur(18px);
        box-shadow: 0 30px 90px rgba(0, 0, 0, 0.78);
        overflow: hidden;
      }

      .wda-modal-head {
        padding: 14px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.02);
      }

      .wda-modal-body { padding: 14px 16px; }
      .wda-modal-foot { padding: 12px 16px 16px; display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap; }

      .wda-spin {
        width: 16px;
        height: 16px;
        border-radius: 9999px;
        border: 2px solid rgba(244, 244, 245, 0.18);
        border-top-color: rgba(34, 211, 238, 0.95);
        box-shadow: 0 0 18px rgba(34, 211, 238, 0.22);
        animation: wdaSpin 0.9s linear infinite;
      }

      .wda-bars {
        display: grid;
        grid-template-columns: repeat(12, minmax(0, 1fr));
        gap: 6px;
        align-items: end;
        height: 52px;
      }

      .wda-bar {
        width: 100%;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.08);
        overflow: hidden;
        position: relative;
      }

      .wda-bar::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(52, 211, 153, 0.75), rgba(34, 211, 238, 0.18));
        opacity: 0.9;
      }

      .wda-bar.muted::after {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0.06));
        opacity: 0.7;
      }

      @keyframes wdaSpin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body class="min-h-screen bg-black text-white">
    <div class="min-h-screen bg-shell">
      <div class="mx-auto w-full max-w-[580px] px-4 pt-4 pb-10">

        <!-- 主 tabs -->
        <div class="mt-2 flex items-end justify-center gap-12">
          <button type="button" class="main-tab text-2xl font-black text-zinc-200/85" data-action="mainTab" data-sec="onboarding">教会 AI</button>
          <button type="button" class="main-tab active text-2xl font-black text-zinc-200/85" data-action="mainTab" data-sec="radar">成交助手</button>
        </div>

        <!-- Header / KPIs -->
        <div class="mt-5 gstroke p-4">
          <div class="flex items-start justify-between gap-3">
            <div class="min-w-0">
              <div class="text-lg font-black tracking-tight text-zinc-100">微信成交助手</div>
              <div class="mt-1 text-xs leading-5 text-zinc-200/60">
                <span class="text-emerald-200/90 font-black">多订座 · 少跑单 · 促复购</span>
              </div>
            </div>
            <button class="btn-secondary btn-sm" type="button" data-action="openSettings">设置</button>
          </div>

          <div class="mt-4 grid grid-cols-3 gap-2">

            repeat_customers: repeatCustomers,
            refund_amount: refundAmount,
            occupancy_rate: occupancy,
            peak_hour: peakHour,
            hourly_orders: hourlyOrders
          };
        }

        function getStoreDay(dayKey) {
          const k = String(dayKey || "").trim() || isoDayKey(now());
          const existing = state.db.store_days && state.db.store_days[k];
          if (existing) return existing;
          const generated = generateStoreDay(k);
          state.db.store_days[k] = generated;
          return generated;
        }

        function getLead(id) {
          return state.db.leads.find((l) => l.id === id) || null;
        }

        function computeScore(lead) {
          const ageH = (now().getTime() - new Date(lead.last_touch_at).getTime()) / 3600 / 1000;
          const stage = String(lead.stage || "");
          const stageBoost =
            stage.includes("预订待定金") ? 34 :
            stage.includes("菜单确认") ? 28 :
            stage.includes("预订") ? 24 :
            stage.includes("到店意向") ? 20 :
            stage.includes("到店") ? 18 :
            stage.includes("复购") ? 14 :
            stage.includes("新客") ? 12 : 10;
          const valueBoost = clamp(Math.log10((lead.value_estimate || 0) + 10) * 10, 6, 28);
          const signalBoost = (lead.signals || []).reduce((s, x) => s + (Number(x.w) || 0) * 3, 0);
          const urgency = clamp(ageH / 6, 0, 18);
          return Math.round(stageBoost + valueBoost + signalBoost + urgency);
        }

        function scoreLabel(score) {
          if (score >= 88) return { text: "高意向", cls: "wda-chip--ok" };
          if (score >= 72) return { text: "需要推进", cls: "wda-chip--cyan" };
          if (score >= 58) return { text: "别漏掉", cls: "wda-chip--warn" };
          return { text: "可稍后", cls: "" };
        }

        function fmtRelTime(iso) {
          const ms = now().getTime() - new Date(iso).getTime();
          const h = Math.max(0, Math.round(ms / 3600 / 1000));
          if (h < 24) return `${h}小时`;
          const d = Math.round(h / 24);
          return `${d}天`;
        }

        function silentHours(lead) {
          return (now().getTime() - new Date(lead.last_touch_at).getTime()) / 3600 / 1000;
        }

        function shouldAskFeedback(lead) {
          const fb = lead.feedback || {};
          if (fb.status === "won" || fb.status === "lost") return false;
          if (fb.status === "no_response" && silentHours(lead) < 120) return false;
          if (fb.next_prompt_at && new Date(fb.next_prompt_at).getTime() > now().getTime()) return false;
          return silentHours(lead) >= 12;
        }

        function feedbackSummary(lead) {
          const fb = lead.feedback || {};
          if (fb.status === "won") return `已成交${fb.amount_range ? " · " + fb.amount_range : ""}`;
          if (fb.status === "lost") return `未成交${fb.loss_reason ? " · " + fb.loss_reason : ""}`;
          if (fb.status === "following") return "还在跟进 · 3天后再问";
          if (fb.status === "no_response") return "未响应 · 弱负信号 0.3，仍可补标";
          return "";
        }

        function renderFeedbackPrompt(lead, { compact = false } = {}) {
          const summary = feedbackSummary(lead);
          const canStillAsk = shouldAskFeedback(lead);
          if (summary) {
            const meta =
              lead.feedback?.status === "won" ? "正样本 · 已标注实际价值" :
              lead.feedback?.status === "lost" ? "负样本 · 已记录失败原因" :
              lead.feedback?.status === "no_response" ? "弱负信号 · 按 0.3 权重降权" :
              "延迟标注 · 3 天后再问一次";
            if (canStillAsk && lead.feedback?.status === "no_response") {
              const age = Math.round(silentHours(lead));
              return `
                <div class="wda-feedback-card ${compact ? "mt-2" : ""}">
                  <div class="wda-feedback-q">${escapeHtml(lead.name)}那边后来有结果吗？</div>
                  <div class="wda-feedback-meta">已先按弱负信号记录 · 对话沉默 ${escapeHtml(age)} 小时 · 仍可一键补标</div>
                  <div class="wda-feedback-actions">
                    <button class="wda-feedback-btn" type="button" data-action="feedbackOutcome" data-id="${escapeHtml(lead.id)}" data-outcome="won">✅ 成交了</button>
                    <button class="wda-feedback-btn" type="button" data-action="feedbackOutcome" data-id="${escapeHtml(lead.id)}" data-outcome="lost">❌ 没成交</button>
                    <button class="wda-feedback-btn" type="button" data-action="feedbackOutcome" data-id="${escapeHtml(lead.id)}" data-outcome="following">⏳ 还在跟进</button>
                  </div>
                  <div class="wda-feedback-value">商家补点一下，会覆盖弱信号，写成更准确的正/负样本。</div>
                </div>
              `;
            }
            return `
              <div class="wda-feedback-card">
                <div class="wda-feedback-q">${escapeHtml(lead.name)} 的结果已记录</div>
                <div class="wda-feedback-meta">${escapeHtml(summary)} · ${escapeHtml(meta)}</div>
              </div>
            `;
          }
          if (!shouldAskFeedback(lead)) return "";
          const age = Math.round(silentHours(lead));
          return `
            <div class="wda-feedback-card ${compact ? "mt-2" : ""}">
              <div class="wda-feedback-q">${escapeHtml(lead.name)}那边有消息吗？</div>
              <div class="wda-feedback-meta">对话沉默 ${escapeHtml(age)} 小时后自动追问 · 3 步以内结束</div>
              <div class="wda-feedback-actions">
                <button class="wda-feedback-btn" type="button" data-action="feedbackOutcome" data-id="${escapeHtml(lead.id)}" data-outcome="won">✅ 成交了</button>
                <button class="wda-feedback-btn" type="button" data-action="feedbackOutcome" data-id="${escapeHtml(lead.id)}" data-outcome="lost">❌ 没成交</button>
                <button class="wda-feedback-btn" type="button" data-action="feedbackOutcome" data-id="${escapeHtml(lead.id)}" data-outcome="following">⏳ 还在跟进</button>
              </div>
              <div class="wda-feedback-value">商家点一下，系统会顺手完成结果标注、失败归因和下一轮跟进节奏。</div>
            </div>
          `;
        }

        function renderKpis() {
          const leads = state.db.leads;
          const top3 = [...leads].sort((a, b) => computeScore(b) - computeScore(a)).slice(0, 3);
          const potential = top3.reduce((s, l) => s + (Number(l.value_estimate) || 0), 0);
          const overdue = state.db.tasks.filter((t) => t.status === "overdue").length;
          const due = state.db.tasks.filter((t) => t.status === "due").length;
          const rebuy = leads
            .filter((l) => String(l.stage || "").includes("复购") || (l.tags || []).includes("已消费"))
            .filter((l) => (now().getTime() - new Date(l.last_touch_at).getTime()) / 86400000 >= 30).length;
          document.getElementById("wdaKpiPotential").textContent = fmtMoney(potential);
          document.getElementById("wdaKpiDue").textContent = `${due}/${overdue}`;
          document.getElementById("wdaKpiRebuy").textContent = String(rebuy);
        }

        function feedbackPendingLeads() {
          return [...state.db.leads]
            .filter((l) => shouldAskFeedback(l))
            .sort((a, b) => silentHours(b) - silentHours(a));
        }

        function renderFeedbackBoard() {
          const pending = feedbackPendingLeads();
          const recent = [...(state.db.feedback_events || [])].slice(-3).reverse();
          if (!pending.length && !recent.length) return "";
          return `
            <div class="gstroke p-4">
              <div class="flex items-start justify-between gap-3">
                <div>
                  <div class="text-base font-black">待标注反馈</div>
                  <div class="mt-1 text-xs text-zinc-200/60 leading-5">不是额外填表。沉默 12-16 小时后，系统顺手问一句，商家点一下就结束。</div>
                </div>
                <span class="wda-chip wda-chip--cyan">${escapeHtml(pending.length)} 个待确认</span>
              </div>
              <div class="mt-3 grid gap-2">
                ${pending.length ? pending.slice(0, 3).map((l) => renderFeedbackPrompt(l)).join("") : `
                  <div class="rounded-2xl border border-white/10 bg-white/5 p-3 text-xs text-zinc-200/60">
                    暂无待确认结果。系统会在客户对话沉默后自动出现。
                  </div>
                `}
              </div>
              ${recent.length ? `
                <div class="mt-3 rounded-2xl border border-white/10 bg-white/5 p-3">
                  <div class="text-xs font-black text-zinc-200/60">最近写入模型</div>
                  <div class="mt-2 grid gap-1">
                    ${recent.map((e) => {
                      const lead = getLead(e.lead_id);
                      return `<div class="text-xs text-zinc-200/60 leading-5">• ${escapeHtml(lead ? lead.name : "客户")}：${escapeHtml(e.model_note || e.status || "")}</div>`;
                    }).join("")}
                  </div>
                </div>
              ` : ``}
            </div>
          `;
        }

        function applySilentFeedbackSignals() {
          let changed = false;
          state.db.leads.forEach((lead) => {
            const fb = lead.feedback || {};
            if (fb.status) return;
            if (silentHours(lead) < 84) return;
            lead.feedback = {
              status: "no_response",
              updated_at: nowISO(),
              weak_weight: 0.3
            };
            state.db.feedback_events.push({
              id: uid(),
              lead_id: lead.id,
              status: "no_response",
              model_label: "weak_negative",
              model_weight: 0.3,
              model_note: "商家未响应反馈请求：按弱负信号处理，降低这类线索/话术权重。",
              created_at: nowISO()
            });
            changed = true;
          });
          if (changed) saveState(state);
        }

        function setSec(sec) {
          const allowedSecs = new Set(["onboarding", "radar", "customers", "tasks", "copilot", "safety"]);
          state.ui.sec = allowedSecs.has(sec) ? sec : "radar";
          saveState(state);
          document.querySelectorAll("#wdaSeg [data-sec]").forEach((b) => b.classList.toggle("active", b.dataset.sec === state.ui.sec));
          document.querySelectorAll(".main-tab[data-sec]").forEach((b) => {
            const isDeal = state.ui.sec !== "onboarding" && b.dataset.sec === "radar";
            b.classList.toggle("active", b.dataset.sec === state.ui.sec || isDeal);
          });
          render();
        }

        function renderRadar() {
          const storeDayKey = state.ui.day_key || isoDayKey(now());

          const dealLeads = ranked.filter(({ l }) => !isActivation(l));
          const activationLeads = ranked
            .filter(({ l }) => isActivation(l))

                </div>
                <div class="flex items-center justify-end">

                </div>

              <div class="mt-3 grid grid-cols-3 gap-2">
                <div class="rounded-2xl border border-white/10 bg-white/5 p-3">
                  <div class="text-[11px] font-black tracking-wide text-zinc-200/55">营业额</div>
                  <div class="mt-1 text-[18px] font-black text-zinc-100">${escapeHtml(fmtMoney(storeDay.revenue))}</div>
                  <div class="mt-1 text-[11px] text-zinc-200/55">客单 ¥${escapeHtml(fmtInt(storeDay.avg_ticket))}</div>
                </div>
                <div class="rounded-2xl border border-white/10 bg-white/5 p-3">
                  <div class="text-[11px] font-black tracking-wide text-zinc-200/55">订单</div>
                  <div class="mt-1 text-[18px] font-black text-zinc-100">${escapeHtml(fmtInt(storeDay.orders))}</div>
                  <div class="mt-1 text-[11px] text-zinc-200/55">堂食 ${escapeHtml(fmtInt(storeDay.dine_in_orders))} / 外卖 ${escapeHtml(fmtInt(storeDay.delivery_orders))}</div>
                </div>
                <div class="rounded-2xl border border-white/10 bg-white/5 p-3">
                  <div class="text-[11px] font-black tracking-wide text-zinc-200/55">到店</div>
                  <div class="mt-1 text-[18px] font-black text-zinc-100">${escapeHtml(fmtInt(storeDay.reservations))}</div>
                  <div class="mt-1 text-[11px] text-zinc-200/55">预订单 / 高峰 ${escapeHtml(String(storeDay.peak_hour))}:00</div>
                </div>
              </div>

              <div class="mt-3 rounded-2xl border border-white/10 bg-white/5 p-3">
                <div class="flex items-center justify-between gap-3">
                  <div class="text-xs font-black text-zinc-200/60">订单分布（11:00-22:00）</div>
                  <div class="text-xs text-zinc-200/55">上座率 ${(storeDay.occupancy_rate * 100).toFixed(0)}% · 退款 ${escapeHtml(fmtMoney(storeDay.refund_amount))}</div>
                </div>
                <div class="mt-2 wda-bars">
                  ${storeDay.hourly_orders.map((v) => {
                    const max = Math.max(1, ...storeDay.hourly_orders);
                    const h = clamp((v / max) * 100, 8, 100);
                    const muted = v <= Math.max(1, Math.round(max * 0.18));
                    return `<div class="wda-bar ${muted ? "muted" : ""}" style="height:${h}%"></div>`;
                  }).join("")}
                </div>
              </div>
            </div>

            ${renderFeedbackBoard()}

	            <div class="gstroke p-4">
	              <div class="flex items-start justify-between gap-3">
	                <div>
	                  <div class="text-base font-black">今日雷达</div>
	                  <div class="mt-1 text-xs text-zinc-200/60 leading-5">优先跟进清单</div>
	                </div>
	              </div>
	              <div class="mt-3 grid gap-2">
                ${dealLeads.map(({ l, s }) => {
                  const lb = scoreLabel(s);
                  const risk = String(l.risk || "").includes("当天") ? `<span class="wda-chip wda-chip--danger">窗口期</span>` : `<span class="wda-chip wda-chip--warn">易漏</span>`;
                  return `
                    <div class="wda-item" data-action="openLead" data-id="${escapeHtml(l.id)}">
                      <div class="flex items-start justify-between gap-3">
                        <div class="min-w-0">
                          <div class="font-black text-zinc-100 truncate">${escapeHtml(l.name)} <span class="text-zinc-200/55 font-black">· ${escapeHtml(l.alias)}</span></div>
                          <div class="mt-1 text-xs text-zinc-200/60">
                            上次触达：${escapeHtml(fmtRelTime(l.last_touch_at))}前 · 阶段：<span class="text-zinc-100/85 font-black">${escapeHtml(l.stage)}</span>
                          </div>
                          <div class="mt-2 flex flex-wrap gap-2">
                            <span class="wda-chip ${escapeHtml(lb.cls)}">${escapeHtml(lb.text)} · ${escapeHtml(s)}分</span>
                            ${risk}
                            <span class="wda-chip">${escapeHtml(fmtMoney(l.value_estimate))}</span>
                            <span class="wda-chip wda-chip--cyan">下一步：${escapeHtml(l.next_best_action)}</span>
                          </div>

                      </div>
                    </div>

              </div>
            </div>

	            <div class="gstroke p-4">
	              <div class="flex items-start justify-between gap-3">
	                <div>
	                  <div class="text-base font-black">老客激活</div>

              <div class="mt-3 grid gap-2">
                ${activationLeads.length ? activationLeads.map(({ l, silent }) => `

                        <div class="mt-2 flex flex-wrap gap-2">
                          <span class="wda-chip wda-chip--warn">沉默</span>
                          <span class="wda-chip">${escapeHtml(l.stage)}</span>
                          <span class="wda-chip wda-chip--cyan">开场话术</span>
                        </div>

                      <div class="shrink-0">

                  <div class="rounded-2xl border border-white/10 bg-white/5 p-3 text-xs text-zinc-200/60">
                    暂无可激活客户。
                  </div>
                `}
              </div>
            </div>
          `;
        }

        function renderCustomers() {
          const q = String(state.ui.customer_q || "").trim().toLowerCase();
          const stage = state.ui.customer_stage || "全部";
          const stages = ["全部", ...Array.from(new Set(state.db.leads.map((l) => l.stage).filter(Boolean)))];
          const leads = state.db.leads
            .filter((l) => {
              const hay = (l.name + " " + l.alias + " " + (l.tags || []).join(" ")).toLowerCase();
              if (q && !hay.includes(q)) return false;
              if (stage !== "全部" && l.stage !== stage) return false;
              return true;
            })
            .map((l) => ({ l, s: computeScore(l) }))
            .sort((a, b) => b.s - a.s);

          return `
            <div class="gstroke p-4">
              <div class="flex items-start justify-between gap-3">
                <div>
                  <div class="text-base font-black">客户库</div>
                  <div class="mt-1 text-xs text-zinc-200/60 leading-5">由微信对话自动识别客户、阶段和标签。</div>
                </div>
                <span class="wda-chip wda-chip--cyan">自动沉淀</span>
              </div>

              <div class="mt-3 grid gap-2">
                <input class="wda-input" placeholder="搜索客户 / 标签" value="${escapeHtml(state.ui.customer_q || "")}" data-action="customerSearch" />
                <div class="flex flex-wrap gap-2">
                  ${stages.map((s) => `<button class="btn-pill ${s === stage ? "btn-pill--cyan" : ""}" type="button" data-action="customerStage" data-stage="${escapeHtml(s)}">${escapeHtml(s)}</button>`).join("")}
                </div>
              </div>

              <div class="mt-3 grid gap-2">
                ${leads.map(({ l, s }) => {
                  const lb = scoreLabel(s);
                  return `
                    <div class="wda-item" data-action="openLead" data-id="${escapeHtml(l.id)}">
                      <div class="flex items-start justify-between gap-3">
                        <div class="min-w-0">
                          <div class="font-black text-zinc-100 truncate">${escapeHtml(l.name)} <span class="text-zinc-200/55 font-black">· ${escapeHtml(l.alias)}</span></div>
                          <div class="mt-1 text-xs text-zinc-200/60">阶段：<span class="text-zinc-100/85 font-black">${escapeHtml(l.stage)}</span> · 上次：${escapeHtml(fmtRelTime(l.last_touch_at))}前</div>

        function renderTasks() {
          const tasks = [...state.db.tasks].sort((a, b) => new Date(a.due_at) - new Date(b.due_at));
          const counts = {
            overdue: tasks.filter((t) => t.status === "overdue").length,
            due: tasks.filter((t) => t.status === "due").length,
            planned: tasks.filter((t) => t.status === "planned").length
          };

          return `
            <div class="gstroke p-4">
              <div class="flex items-start justify-between gap-3">
                <div>
                  <div class="text-base font-black">跟进清单</div>
                  <div class="mt-1 text-xs text-zinc-200/60 leading-5">系统根据客户意向、沉默时间和未完成动作自动生成。</div>
                </div>
                <span class="wda-chip wda-chip--cyan">自动生成</span>
              </div>
              <div class="mt-3 flex flex-wrap gap-2">
                <span class="wda-chip wda-chip--danger">逾期 ${escapeHtml(counts.overdue)}</span>
                <span class="wda-chip wda-chip--warn">今天 ${escapeHtml(counts.due)}</span>
                <span class="wda-chip">计划 ${escapeHtml(counts.planned)}</span>
              </div>

              <div class="mt-3 grid gap-2">
                ${tasks.map((t) => {
                  const lead = getLead(t.lead_id);
                  const chip =
                    t.status === "overdue" ? `<span class="wda-chip wda-chip--danger">逾期</span>` :
                    t.status === "due" ? `<span class="wda-chip wda-chip--warn">今天</span>` :
                    t.status === "done" ? `<span class="wda-chip wda-chip--ok">完成</span>` : `<span class="wda-chip">计划</span>`;
                  return `
                    <div class="wda-item" data-action="openLead" data-id="${escapeHtml(t.lead_id)}">
                      <div class="flex items-start justify-between gap-3">
                        <div class="min-w-0">
                          <div class="font-black text-zinc-100 truncate">${escapeHtml(lead ? (lead.name + " · " + lead.alias) : "未知客户")}</div>
                          <div class="mt-1 text-sm text-zinc-100/80 leading-6">${escapeHtml(t.title)}</div>
                          <div class="mt-2 flex flex-wrap gap-2">
                            ${chip}
                            <span class="wda-chip wda-chip--cyan">到期：${escapeHtml(new Date(t.due_at).toLocaleString("zh-CN", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" }))}</span>
                          </div>
                        </div>

                ${row("require_confirm", "每条建议都需确认", "默认需要确认。")}
                ${row("local_first", "本地优先（可选）", "优先本地存储/计算。")}
              </div>
            </div>
          `;
        }

        function render() {
          applySilentFeedbackSignals();
          const root = document.getElementById("wdaPanelRoot");
          const sec = state.ui.sec || "radar";
          const html =
            sec === "onboarding" ? renderOnboarding() :
            sec === "radar" ? renderRadar() :
            sec === "customers" ? renderCustomers() :
            sec === "tasks" ? renderTasks() :
            sec === "copilot" ? renderCopilot() :
            sec === "safety" ? renderSafety() : renderRadar();
          root.innerHTML = html;
          renderKpis();
        }

        function openDrawer(html) {
          state.ui.drawer_open = true;
          saveState(state);
          document.getElementById("wdaDrawerBody").innerHTML = html;
          document.getElementById("wdaOverlay").classList.add("show");
          document.getElementById("wdaDrawer").classList.add("show");
        }

        function closeDrawer() {
          state.ui.drawer_open = false;
          state.ui.selected_lead_id = null;
          saveState(state);
          document.getElementById("wdaOverlay").classList.remove("show");
          document.getElementById("wdaDrawer").classList.remove("show");
          document.getElementById("wdaDrawerBody").innerHTML = "";
        }

        function openModal({ title, bodyHtml, footHtml, onMount }) {
          document.getElementById("wdaModalTitle").textContent = title || "设置";
          document.getElementById("wdaModalBody").innerHTML = bodyHtml || "";
          document.getElementById("wdaModalFoot").innerHTML = footHtml || "";
          document.getElementById("wdaModalWrap").classList.add("show");
          if (typeof onMount === "function") onMount();
        }

        function closeModal() {
          document.getElementById("wdaModalWrap").classList.remove("show");
          document.getElementById("wdaModalBody").innerHTML = "";
          document.getElementById("wdaModalFoot").innerHTML = "";
        }

        function buildAdvice(lead) {
          const name = lead.name;
          const action = lead.next_best_action;
          const value = fmtMoney(lead.value_estimate);
          const isRebuy = String(lead.stage || "").includes("复购") || (lead.tags || []).includes("已消费");
          if (isRebuy) {
            const r1 = `${name}，最近还会来吃吗？上次你点的那几道大家反馈挺好。\n这周我们出了个更适合你口味的搭配，我给你发一份推荐，你看要不要安排一下？`;
            const r2 = `${name}，我记得你上次是（包间/外卖/聚餐）场景。\n如果你最近有聚餐/活动，我可以按人数给你 2 套更稳的菜单，省你来回选。\n你大概几个人、哪天方便？`;
            const r3 = `${name}，问你个小事：你身边有没有同事/朋友也在找聚餐的地方？\n我可以先给他一份“菜单+档期”信息，你转过去也不尴尬。\n（你这边如果要订包间，我也可以帮你优先留位。）`;
            return [r1, r2, r3];
          }
          const a = `${name}，我把你关心的点整理好了：\n1）${action}\n2）我按人数给你 2 档套餐对比，口味/分量都写清楚。\n你更倾向哪一档？`;
          const b = `${name}，我建议我们先把关键项定下来：\n- 时间/人数\n- 是否包间\n确认后我就帮你把 ${action} 安排好，避免临时没位置。`;
          const c = `${name}，为了不耽误你安排，我给你两个选择：\nA）我按人数直接给你一套菜单 + 预订方式\nB）你告诉我偏好（清淡/微辣/海鲜/不吃辣），我给你更贴合的一套\n（预估：${value}）`;
          return [a, b, c];
        }

        function nowISO() {
          return now().toISOString();
        }

        function outboxItems() {
          state.db.outbox = Array.isArray(state.db.outbox) ? state.db.outbox : [];
          return state.db.outbox;
        }

        function defaultInboundForLead(lead) {
          const stage = String(lead.stage || "");
          if (stage.includes("预订待定金")) return "周六晚上还有包间吗？定金怎么收？";
          if (stage.includes("菜单确认")) return "可以自带蛋糕吗？菜单怎么选比较合适？";
          if (stage.includes("到店意向")) return "停车方便吗？我们大概8-10人，需要预订吗？";
          if (stage.includes("复购")) return "最近有啥推荐的？想换个口味。";
          return "你们现在人多吗？需要提前预订吗？";
        }

        function buildAutoFollowupPlan({ lead, inboundText }) {
          const name = lead.name;
          const stage = String(lead.stage || "");
          const inbound = String(inboundText || "").trim();
          const action = String(lead.next_best_action || "").trim();
          const tuning = state.prefs.tuning || {};
          const clone = state.prefs.clone || {};
          const tuningHint = tuning.key ? `\n\n老板偏好：${tuning.label}。本次回复已按这个偏好调整。` : "";
          const priceStyleHint =
            tuning.price_style === "low_first" ? "\n\n老板训练：客户问价格时，先给最低可选方案，再补充升级选择。" :
            tuning.price_style === "value_first" ? "\n\n老板训练：客户问价格时，先解释套餐价值、菜品分量和服务，再给价格区间。" :
            tuning.price_style === "visit_first" ? "\n\n老板训练：客户问价格时，先引导确认人数/到店时间/场景，再报价。" :
            "";
          const cloneHint = clone.completed
            ? `\n\n老板分身：按老板常用语气回复。说话风格：${clone.signature_style || "自然、直接、像熟人聊天"}。店铺基础信息：${clone.store_info || "按现有门店信息回答"}。老板原话样本：${clone.tone_sample || "先礼貌接住，再给清楚下一步"}。`
            : "";

          const keyword =
            inbound.includes("包间") ? "包间/档期" :
            inbound.includes("定金") ? "定金" :
            inbound.includes("菜单") || inbound.includes("套餐") ? "菜单/套餐" :
            inbound.includes("停车") || inbound.includes("位置") ? "停车/位置" :
            inbound.includes("开票") || inbound.includes("发票") ? "发票" :
            "安排";

          const replyNowBase =
            stage.includes("预订待定金") ? `${name}，收到～我先帮你看下档期。\n关于${keyword}我给你两种方案：\n1）先把包间预留，定金确认后锁档\n2）不方便付定金的话我也先帮你留到今晚\n你这边大概几点、多少人？` :
            stage.includes("菜单确认") ? `${name}，可以的～我把规则和菜单建议一次发你：\n- ${action}\n你们大概多少人、有没有忌口？我按人数给你 2 档更稳的菜单。` :
            stage.includes("到店意向") ? `${name}，收到～\n- 停车/位置我发你指引\n- 为了不排队，建议先把时间/人数定一下\n你预计几点到、几个人？` :
            stage.includes("复购") ? `${name}，安排～我按你上次的口味偏好给你配一份更稳的推荐。\n你这次偏清淡还是想试试微辣？` :
            `${name}，收到～我先把关键信息确认一下：时间/人数/是否包间。\n确认后我就按 ${action} 帮你安排好。`;
          const replyNow = replyNowBase + tuningHint + priceStyleHint + cloneHint;

          const fu4h =
            stage.includes("预订待定金") ? `${name}，我刚确认了包间档期。\n如果你方便，我建议先付定金锁档，我这边就帮你把包间预留好。\n你要不要我把定金规则和两档套餐一起发你？` :
            `${name}，我把你这边的安排整理成一条信息了（时间/人数/菜单/预订方式）。\n你看我按哪个方案先给你定？`;

          const fu24h =
            stage.includes("预订待定金") ? `${name}，怕你临时不好安排，我再确认一下：今晚前如果你回我一个“时间+人数”，我就先帮你把包间留住。\n需要我直接给你一个更省事的套餐推荐吗？` :
            `${name}，我这边还可以帮你把“菜单/位置/预订方式”一次讲清，省你来回问。\n你方便的话回我一句：哪天、几个人？`;

          return {
            lead_id: lead.id,
            inbound,
            items: [
              { step: "reply_now", label: "立即回复", delay_h: 0, text: replyNow },
              { step: "followup_4h", label: "未回复 4 小时", delay_h: 4, text: fu4h },
              { step: "followup_24h", label: "未回复 24 小时", delay_h: 24, text: fu24h }
            ]
          };
        }

        function enqueueFollowupPlan(plan, { autoSendDemo } = {}) {
          if (!plan || !Array.isArray(plan.items)) return 0;
          const leadId = plan.lead_id;
          const base = now().getTime();
          let added = 0;

          plan.items.forEach((it) => {
            const scheduled = new Date(base + (Number(it.delay_h) || 0) * 3600 * 1000).toISOString();
            const exists = outboxItems().some((m) => m.lead_id === leadId && m.step === it.step && m.status === "queued");
            if (exists) return;
            outboxItems().push({
              id: uid(),
              lead_id: leadId,
              step: it.step,
              label: it.label,
              text: it.text,
              scheduled_at: scheduled,
              status: "queued",
              created_at: nowISO()
            });
            added += 1;
          });

          if (autoSendDemo) {
            const first = outboxItems().find((m) => m.lead_id === leadId && m.step === "reply_now" && m.status === "queued");
            if (first) {
              first.status = "sent";
              first.sent_at = nowISO();
              const lead = getLead(leadId);
              if (lead) lead.last_touch_at = nowISO();
            }
          }

          return added;
        }

        function outboxMarkSent(msgId) {
          const msg = outboxItems().find((m) => m.id === msgId);
          if (!msg) return;
          msg.status = "sent";
          msg.sent_at = nowISO();
          const lead = getLead(msg.lead_id);
          if (lead) lead.last_touch_at = nowISO();
          saveState(state);
          toast("已标记发送");
          render();
        }

        function outboxCancel(msgId) {
          const msg = outboxItems().find((m) => m.id === msgId);
          if (!msg) return;
          msg.status = "canceled";
          msg.canceled_at = nowISO();
          saveState(state);
          toast("已取消");
          render();
        }

        function outboxClearQueued() {
          const before = outboxItems().length;
          state.db.outbox = outboxItems().filter((m) => m.status !== "queued");
          saveState(state);
          toast(before === state.db.outbox.length ? "无待发送" : "已清空待发送");
          render();
        }

        function recordFeedback({ leadId, status, amountRange = "", lossReason = "" }) {
          const lead = getLead(leadId);
          if (!lead) return;
          const at = nowISO();
          const nextPromptAt = status === "following" ? new Date(now().getTime() + 3 * 86400000).toISOString() : "";
          lead.feedback = {
            status,
            amount_range: amountRange,
            loss_reason: lossReason,
            updated_at: at,
            next_prompt_at: nextPromptAt
          };

          const modelSignal =
            status === "won" ? { label: "positive", weight: 1, note: "成交 + 金额：这套对话与话术写入正样本，标注实际价值。" } :
            status === "lost" ? { label: "negative", weight: 1, note: `未成交 + ${lossReason || "未知原因"}：写入负样本，用于优化应对话术。` } :
            { label: "delayed", weight: 0.6, note: "还在跟进：延迟标注，3 天后再问一次。" };

          state.db.feedback_events.push({
            id: uid(),
            lead_id: leadId,
            status,
            amount_range: amountRange,
            loss_reason: lossReason,
            model_label: modelSignal.label,
            model_weight: modelSignal.weight,
            model_note: modelSignal.note,
            created_at: at
          });

          if (status === "won") {
            lead.stage = "已成交";
            if (amountRange === "< ¥2000") lead.value_estimate = Math.max(Number(lead.value_estimate) || 0, 1800);
            if (amountRange === "¥2000-5000") lead.value_estimate = Math.max(Number(lead.value_estimate) || 0, 3500);
            if (amountRange === "> ¥5000") lead.value_estimate = Math.max(Number(lead.value_estimate) || 0, 6800);
          }
          if (status === "lost") lead.stage = "已流失";
          if (status === "following") {
            const exists = state.db.tasks.some((t) => t.lead_id === leadId && t.kind === "feedback_retry" && t.status !== "done");
            if (!exists) {
              state.db.tasks.push({
                id: uid(),
                lead_id: leadId,
                title: "3天后确认这单是否成交",
                due_at: nextPromptAt,
                status: "planned",
                kind: "feedback_retry"
              });
            }
          }

          saveState(state);
          closeModal();
          toast(status === "won" ? "已记录成交结果" : status === "lost" ? "已记录未成交原因" : "已延后，3天后再问");
          render();
          if (state.ui.drawer_open && state.ui.selected_lead_id === leadId) openLead(leadId);
        }

        function openFeedbackOutcome(leadId, outcome) {
          const lead = getLead(leadId);
          if (!lead) return;
          if (outcome === "following") {
            recordFeedback({ leadId, status: "following" });
            return;
          }
          if (outcome === "won") {
            openModal({
              title: `${lead.name} 成交了`,
              bodyHtml: `
                <div class="grid gap-3">
                  <div class="gstroke p-3">
                    <div class="text-sm font-black text-zinc-100">太棒了！大概消费多少？</div>
                    <div class="mt-2 text-xs text-zinc-200/55 leading-5">只点一下即可，金额会写入这套对话的实际价值。</div>
                  </div>
                  <div class="grid grid-cols-2 gap-2">
                    ${["< ¥2000", "¥2000-5000", "> ¥5000", "跳过"].map((x) => `
                      <button class="btn-secondary btn-sm" type="button" data-action="feedbackAmount" data-id="${escapeHtml(leadId)}" data-amount="${escapeHtml(x)}">${escapeHtml(x)}</button>
                    `).join("")}
                  </div>
                  <div class="wda-feedback-value">写入模型：成交 + 金额 → 正样本，标注这套话术的实际价值。</div>
                </div>
              `,
              footHtml: `<button class="btn-secondary btn-sm" type="button" data-action="closeModal">取消</button>`
            });
            return;
          }
          openModal({
            title: `${lead.name} 没成交`,
            bodyHtml: `
              <div class="grid gap-3">
                <div class="gstroke p-3">
                  <div class="text-sm font-black text-zinc-100">知道是什么原因吗？</div>
                  <div class="mt-2 text-xs text-zinc-200/55 leading-5">原因会帮系统识别你店里最常见的成交卡点。</div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                  ${["价格/最低消费", "档期不合适", "去别家了", "自己取消", "不知道"].map((x) => `
                    <button class="btn-secondary btn-sm" type="button" data-action="feedbackLossReason" data-id="${escapeHtml(leadId)}" data-reason="${escapeHtml(x)}">${escapeHtml(x)}</button>
                  `).join("")}
                </div>
                <div class="wda-feedback-value">写入模型：未成交 + 原因 → 负样本，用于优化下次应对话术。</div>
              </div>
            `,
            footHtml: `<button class="btn-secondary btn-sm" type="button" data-action="closeModal">取消</button>`
          });
        }

        function genAdviceForLead(id) {
          const lead = getLead(id);
          if (!lead) return;
          const btn = document.querySelector(`[data-action="genAdvice"][data-id="${CSS.escape(id)}"]`);
          if (btn) {
            btn.disabled = true;
            btn.innerHTML = `<span class="wda-spin"></span><span>生成中…</span>`;
          }
          window.setTimeout(() => {
            const variants = buildAdvice(lead);
            const body = document.getElementById("wdaDrawerBody");
            if (body) {
              const blockId = "wdaAdviceBlock";
              if (!body.querySelector(`#${blockId}`)) {
                const wrap = document.createElement("div");
                wrap.id = blockId;
                wrap.className = "mt-3 gstroke p-3";
                wrap.innerHTML = `
                  <div class="flex items-start justify-between gap-3">
                    <div>
                      <div class="text-xs font-black text-zinc-200/60">跟进话术（点击复制）</div>
                      <div class="mt-1 text-xs text-zinc-200/55">仅生成与复制，你可微调语气。</div>
                    </div>
                    <span class="wda-chip wda-chip--ok">不代发</span>
                  </div>
                  <div class="mt-2 grid gap-2">
                    ${variants.map((t, i) => `
                      <div class="wda-item" data-action="copyText" data-text="${escapeHtml(t)}">
                        <div class="text-xs font-black text-zinc-200/55">版本 ${i + 1}</div>
                        <div class="mt-1 text-sm text-zinc-100/85 leading-6 whitespace-pre-wrap">${escapeHtml(t)}</div>
                        <div class="mt-2"><span class="wda-chip wda-chip--ok">点击复制</span></div>
                      </div>
                    `).join("")}
                  </div>
                `;
                body.appendChild(wrap);
              }
            }
            if (btn) {
              btn.disabled = false;
              btn.innerHTML = `生成话术`;
            }
            toast("已生成 3 条话术");
          }, 780);
        }

        function markTouched(id) {
          const lead = getLead(id);
          if (!lead) return;
          lead.last_touch_at = now().toISOString();
          const hasFuture = state.db.tasks.some((t) => t.lead_id === id && t.status !== "done" && new Date(t.due_at).getTime() > now().getTime());
          if (!hasFuture) {
            state.db.tasks.push({ id: uid(), lead_id: id, title: "回访：确认进展与下一步", due_at: new Date(now().getTime() + 3 * 86400000).toISOString(), status: "planned" });
          }
          saveState(state);
          toast("已标记跟进，已生成回访待办");
          render();
          openLead(id);
        }

        function ensureRebuyActivationTask(leadId) {
          const exists = state.db.tasks.some((t) =>
            t.lead_id === leadId &&
            t.status !== "done" &&
            t.kind === "rebuy_activation" &&
            new Date(t.due_at).getTime() >= now().getTime() - 2 * 3600 * 1000
          );
          if (exists) return false;
          state.db.tasks.push({
            id: uid(),
            lead_id: leadId,
            title: "老客激活：发送开场并引导复购",
            due_at: new Date(now().getTime() + 24 * 3600 * 1000).toISOString(),
            status: "planned",
            kind: "rebuy_activation"
          });
          return true;
        }

        function taskDone(taskId) {
          const t = state.db.tasks.find((x) => x.id === taskId);
          if (!t) return;
          t.status = "done";
          saveState(state);
          toast("已完成");
          render();
          if (state.ui.drawer_open && state.ui.selected_lead_id) openLead(state.ui.selected_lead_id);
        }

        function taskSnooze(taskId) {
          const t = state.db.tasks.find((x) => x.id === taskId);
          if (!t) return;
          t.due_at = new Date(new Date(t.due_at).getTime() + 24 * 3600 * 1000).toISOString();
          t.status = "planned";
          saveState(state);
          toast("已延后 1 天");
          render();
          if (state.ui.drawer_open && state.ui.selected_lead_id) openLead(state.ui.selected_lead_id);
        }

        function copyToClipboard(text) {
          const t = String(text || "");
          if (!t) return;
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(t).then(() => toast("已复制")).catch(() => fallbackCopy(t));
            return;
          }
          fallbackCopy(t);
        }

        function fallbackCopy(text) {
          try {
            const ta = document.createElement("textarea");
            ta.value = text;
            ta.style.position = "fixed";
            ta.style.left = "-9999px";
            document.body.appendChild(ta);
            ta.select();
            document.execCommand("copy");
            document.body.removeChild(ta);
            toast("已复制");
          } catch {
            window.prompt("复制以下文本：", text);
          }
        }

        function openLead(id) {
          const lead = getLead(id);
          if (!lead) return;
          state.ui.selected_lead_id = id;
          saveState(state);
          const score = computeScore(lead);
          const lb = scoreLabel(score);
          const dueTasks = state.db.tasks.filter((t) => t.lead_id === id && t.status !== "done").sort((a, b) => new Date(a.due_at) - new Date(b.due_at));
          const tags = (lead.tags || []).map((t) => `<span class="wda-chip">${escapeHtml(t)}</span>`).join("");
          openDrawer(`
            <div class="pt-2">
              <div class="flex items-start justify-between gap-3">
                <div class="min-w-0">
                  <div class="text-lg font-black text-zinc-100 truncate">${escapeHtml(lead.name)} <span class="text-zinc-200/55 font-black">· ${escapeHtml(lead.alias)}</span></div>
                  <div class="mt-1 text-xs text-zinc-200/60 leading-5">
                    阶段：<span class="text-zinc-100/85 font-black">${escapeHtml(lead.stage)}</span> · 上次触达：${escapeHtml(fmtRelTime(lead.last_touch_at))}前 · 预估：${escapeHtml(fmtMoney(lead.value_estimate))}
                  </div>
                  <div class="mt-2 flex flex-wrap gap-2">
                    <span class="wda-chip ${escapeHtml(lb.cls)}">${escapeHtml(lb.text)} · ${escapeHtml(score)}分</span>
                    <span class="wda-chip wda-chip--warn">${escapeHtml(lead.risk || "需维护关系")}</span>
                    <span class="wda-chip wda-chip--cyan">下一步：${escapeHtml(lead.next_best_action)}</span>
                  </div>
                  <div class="mt-2 flex flex-wrap gap-2">${tags}</div>
                </div>
                <div class="shrink-0 flex flex-col gap-2">
                  <button class="btn-secondary btn-sm" type="button" data-action="editLead" data-id="${escapeHtml(id)}">编辑</button>

            title: "编辑客户",
            bodyHtml: `

        function followupGenerate() {
          const lead = getLead(state.ui.followup_lead_id) || state.db.leads[0];
          let inbound = String(state.ui.followup_inbound || "").trim();
          if (!inbound) {
            inbound = defaultInboundForLead(lead);
            state.ui.followup_inbound = inbound;
          }
          state.ui.followup_plan = buildAutoFollowupPlan({ lead, inboundText: inbound });
          saveState(state);
          render();
          toast("已生成跟进计划");
        }

        function followupEnqueue() {
          const lead = getLead(state.ui.followup_lead_id) || state.db.leads[0];
          let inbound = String(state.ui.followup_inbound || "").trim();
          if (!inbound) {
            inbound = defaultInboundForLead(lead);
            state.ui.followup_inbound = inbound;
          }

          const plan = buildAutoFollowupPlan({ lead, inboundText: inbound });
          state.ui.followup_plan = plan;

          const demoSendAllowed = !state.prefs.safety.never_auto_send;
          const demoSend = !!state.prefs.followup?.demo_send && demoSendAllowed;
          const added = enqueueFollowupPlan(plan, { autoSendDemo: demoSend });
          saveState(state);
          render();
          toast(added ? `已入队 ${added} 条` : "已在队列中");
        }

          state.ui.followup_inbound = "";
          state.ui.followup_plan = null;
          saveState(state);
          render();
          toast("已清空");

        function followupSimInbound() {
          const lead = getLead(state.ui.followup_lead_id) || state.db.leads[0];
          state.ui.followup_inbound = defaultInboundForLead(lead);
          saveState(state);
          render();
          toast("已填入示例消息");

          if (state.prefs.followup?.enabled && state.prefs.followup?.auto_queue) {

            key,

            updated_at: nowISO(),
            lesson_count: Math.max(0, Number(state.prefs.tuning?.lesson_count || 0)) + 1,

          });

        function onboardingStylePick(style) {
          const input = document.getElementById("obStyle");
          const text = document.getElementById("obStyleText");
          if (!input) return;
          const parts = String(input.value || "").split("、").map((x) => x.trim()).filter(Boolean);
          const idx = parts.indexOf(style);
          if (idx >= 0) parts.splice(idx, 1);
          else parts.push(style);
          input.value = parts.join("、");
          if (text) text.textContent = "当前：" + (input.value || "还没选择");
          document.querySelectorAll("[data-action='onboardingStylePick']").forEach((b) => {
            b.classList.toggle("btn-pill--cyan", parts.includes(b.dataset.style));
          });
        }

        function saveOnboarding() {
          const tone = String(document.getElementById("obTone")?.value || "").trim();
          const info = String(document.getElementById("obInfo")?.value || "").trim();
          const style = String(document.getElementById("obStyle")?.value || "").trim();
          if (!tone || !info || !style) return toast("先回答完 3 个入职问题");
          state.prefs.clone = {
            ...(state.prefs.clone || {}),
            tone_sample: tone,
            store_info: info,
            signature_style: style,
            completed: true,
            updated_at: nowISO()
          };
          state.prefs.tuning.lesson_count = Math.max(0, Number(state.prefs.tuning?.lesson_count || 0)) + 3;
          saveState(state);
          closeModal();
          render();
          toast("入职完成：微信助手已记住你的说法");

          const idx = parts.indexOf(style);
          if (idx >= 0) parts.splice(idx, 1);
          else parts.push(style);
          state.prefs.clone = {
            ...clone,
            signature_style: parts.join("、"),
            updated_at: nowISO()
          };
          saveState(state);
          render();
        }

          const style = String(clone.signature_style || "").trim();

            updated_at: nowISO()

          render();

        // --- events ---
        document.addEventListener("click", (e) => {
          const secBtn = e.target.closest("#wdaSeg [data-sec]");
          if (secBtn) return setSec(secBtn.dataset.sec);

          const btn = e.target.closest("[data-action]");
          if (!btn) return;
          const act = btn.dataset.action;
          if (act === "tuneAssistant") e.stopPropagation();
          if (act === "mainTab") return setSec(btn.dataset.sec || "radar");
          if (act === "openLead") return openLead(btn.dataset.id);
          if (act === "closeDrawer") return closeDrawer();
          if (act === "openSettings") return openSettings();
          if (act === "genAdvice") return genAdviceForLead(btn.dataset.id);
          if (act === "openFollowup") {
            const id = btn.dataset.id;
            state.ui.followup_lead_id = id;
            state.ui.followup_inbound = "";
            state.ui.followup_plan = null;
            saveState(state);
            closeDrawer();
            setSec("copilot");
            render();
            return;
          }
          if (act === "markTouched") return markTouched(btn.dataset.id);
          if (act === "taskDone") return taskDone(btn.dataset.task);
          if (act === "taskSnooze") return taskSnooze(btn.dataset.task);
          if (act === "copyText") return copyToClipboard(btn.dataset.text);
          if (act === "followupGenerate") return followupGenerate();
          if (act === "followupEnqueue") return followupEnqueue();
          if (act === "followupReset") return followupReset();
          if (act === "followupSimInbound") return followupSimInbound();
          if (act === "toggleFollowupEnabled") return toggleFollowupEnabled();
          if (act === "toggleFollowupAutoQueue") return toggleFollowupAutoQueue();
          if (act === "toggleFollowupDemoSend") return toggleFollowupDemoSend();
          if (act === "tuneAssistant") return tuneAssistant(btn.dataset.tune);
          if (act === "trainPriceStyle") return trainPriceStyle(btn.dataset.style);
          if (act === "openOnboarding") return openOnboarding();
          if (act === "onboardingStylePick") return onboardingStylePick(btn.dataset.style);
          if (act === "saveOnboarding") return saveOnboarding();
          if (act === "cloneStylePick") return cloneStylePick(btn.dataset.style);
          if (act === "saveClone") return saveClone();
          if (act === "cloneDemoInbound") return cloneDemoInbound();
          if (act === "outboxMarkSent") return outboxMarkSent(btn.dataset.msg);
          if (act === "outboxCancel") return outboxCancel(btn.dataset.msg);
          if (act === "outboxClear") return outboxClearQueued();
          if (act === "feedbackOutcome") return openFeedbackOutcome(btn.dataset.id, btn.dataset.outcome);
          if (act === "feedbackAmount") return recordFeedback({ leadId: btn.dataset.id, status: "won", amountRange: btn.dataset.amount === "跳过" ? "" : btn.dataset.amount });
          if (act === "feedbackLossReason") return recordFeedback({ leadId: btn.dataset.id, status: "lost", lossReason: btn.dataset.reason });
          if (act === "toggleSafety") return toggleSafety(btn.dataset.key);
          if (act === "resetAll") return resetAll();
          if (act === "rebuyNudge") {
            const id = btn.dataset.id;
            const added = ensureRebuyActivationTask(id);
            saveState(state);
            render();
            if (added) toast("已加入跟进清单");
            openLead(id);
            window.setTimeout(() => genAdviceForLead(id), 220);
            return;
          }
          if (act === "editLead") return editLead(btn.dataset.id);
          if (act === "closeModal") return closeModal();
          if (act === "saveSettings") {
            const personaSel = document.getElementById("personaSel");
            state.prefs.persona = personaSel ? personaSel.value : state.prefs.persona;
            state.prefs.safety.never_auto_send = !!document.getElementById("s_never_auto_send")?.checked;
            state.prefs.safety.never_mass_message = !!document.getElementById("s_never_mass_message")?.checked;
            state.prefs.safety.never_auto_add = !!document.getElementById("s_never_auto_add")?.checked;
            state.prefs.safety.require_confirm = !!document.getElementById("s_require_confirm")?.checked;
            state.prefs.safety.local_first = !!document.getElementById("s_local_first")?.checked;
            saveState(state);
            closeModal();
            toast("已保存设置");
            return;
          }
          if (act === "saveLeadEdit") {
            const id = btn.dataset.id;
            const lead = getLead(id);
            if (!lead) return;
            const stage = String(document.getElementById("elStage")?.value || "").trim();
            const tagsRaw = String(document.getElementById("elTags")?.value || "");
            const tags = tagsRaw.split(/[，,、\n]+/).map((s) => s.trim()).filter(Boolean).slice(0, 12);
            const value = Number(document.getElementById("elValue")?.value || 0);
            const notes = String(document.getElementById("elNotes")?.value || "").trim();
            if (stage) lead.stage = stage;
            lead.tags = tags;
            lead.value_estimate = Number.isFinite(value) ? value : lead.value_estimate;
            lead.notes = notes;
            saveState(state);
            closeModal();
            toast("已保存");
            render();
            if (state.ui.drawer_open) openLead(id);
            return;
          }
        });

        document.addEventListener("input", (e) => {
          const el = e.target;
          if (!el || !el.dataset.action) return;
          const act = el.dataset.action;
          if (act === "customerSearch") {
            state.ui.customer_q = el.value || "";
            saveState(state);
            return render();
          }
          if (act === "followupInbound") {
            state.ui.followup_inbound = el.value || "";
            saveState(state);
            return;
          }
          if (act === "cloneToneSample") {
            state.prefs.clone.tone_sample = el.value || "";
            state.prefs.clone.completed = false;
            saveState(state);
            return;
          }
          if (act === "cloneStoreInfo") {
            state.prefs.clone.store_info = el.value || "";
            state.prefs.clone.completed = false;
            saveState(state);
            return;
          }
          if (act === "leadEvidenceSearch") {
            const id = el.dataset.id;
            const box = document.getElementById(`evi-${id}`);
            if (!box) return;
            const q = String(el.value || "").trim().toLowerCase();
            box.querySelectorAll("[data-evi]").forEach((row) => {
              const hay = String(row.dataset.text || "");
              row.style.display = !q || hay.includes(q) ? "" : "none";
            });
            return;
          }
        });

        document.addEventListener("change", (e) => {
          const el = e.target;
          if (!el || !el.dataset.action) return;
          const act = el.dataset.action;
          if (act === "storePickDay") {
            const v = String(el.value || "").trim();
            if (!/^\d{4}-\d{2}-\d{2}$/.test(v)) return;
            state.ui.day_key = v;
            saveState(state);
            return render();
          }
          if (act === "followupLead") {
            state.ui.followup_lead_id = el.value;
            state.ui.followup_plan = null;
            saveState(state);
            return render();
          }
        });

        document.addEventListener("click", (e) => {
          const stageBtn = e.target.closest("[data-action='customerStage']");
          if (!stageBtn) return;
          state.ui.customer_stage = stageBtn.dataset.stage || "全部";
          saveState(state);
          render();
        });

        document.addEventListener("keydown", (e) => {
          if (e.key === "Escape") {
            if (document.getElementById("wdaModalWrap").classList.contains("show")) return closeModal();
            if (document.getElementById("wdaDrawer").classList.contains("show")) return closeDrawer();
          }
        });

        // --- boot ---
        let state = normalizeState(loadState() || seedState());
        saveState(state);
        setSec(state.ui.sec || "radar");
        render();
      })();
    </script>

  </body>
</html>
