# Qiniu upload action for GitHub Actions
# https://github.com/qiniu/action-qiniu-upload
# This is a template. You need to set QINIU_AK, QINIU_SK, QINIU_BUCKET, QINIU_ZONE, QINIU_DEST_DIR as secrets in your repo.

name: Deploy site to Tencloud

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Detect package manager
        id: detect-package-manager
        run: |
          if [ -f "${{ github.workspace }}/yarn.lock" ]; then
            echo "manager=yarn" >> $GITHUB_OUTPUT
            echo "command=install" >> $GITHUB_OUTPUT
            echo "runner=yarn" >> $GITHUB_OUTPUT
            exit 0
          elif [ -f "${{ github.workspace }}/package.json" ]; then
            echo "manager=npm" >> $GITHUB_OUTPUT
            echo "command=ci" >> $GITHUB_OUTPUT
            echo "runner=npx --no-install" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "Unable to determine package manager"
            exit 1
          fi
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: ${{ steps.detect-package-manager.outputs.manager }}
      - name: Install dependencies
        run: npm install
      - name: Build with Vite
        run: npm run build
      - name: Install tencloud
        run: |
          npm install -g @cloudbase/cli
          tcb login --apiKeyId ${{ secrets.TENCENT_CLOUD_API_KEY }} --apiKey ${{ secrets.TENCENT_CLOUD_API_SECRET }}
      - name: Cloud Upload
        run: |
          tcb hosting deploy ./prototype / -e lique-8gutx0qy1cd73fe2