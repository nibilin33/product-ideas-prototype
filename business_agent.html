            const obj = safeJsonParse(raw, null);
            if (!obj) { toast("JSON 无效"); return; }
            if (typeof openJsonEditor._onSave === "function") openJsonEditor._onSave(obj);
            closeModal();
            openJsonEditor._onSave = null;
            return;
          }
        });

        document.addEventListener("input", (e) => {
          const search = e.target.closest('[data-action="setSearch"][data-table]');
          if (search) {
            const table = search.dataset.table;
            const start = search.selectionStart;
            const end = search.selectionEnd;
            ui[table + "_search"] = search.value || "";
            saveUi(ui);
            render();
            const escaped = (window.CSS && typeof CSS.escape === "function") ? CSS.escape(table) : table;
            const next = document.querySelector(`[data-action="setSearch"][data-table="${escaped}"]`);
            if (next && typeof next.focus === "function") {
              next.focus();
              if (typeof start === "number" && typeof end === "number" && typeof next.setSelectionRange === "function") {
                try { next.setSelectionRange(start, end); } catch {}
              }
            }
            return;
          }

          const seven = e.target.closest("[data-seven-action-idx]");
          if (seven) {
            const draft = ensureDraft();
            const selected = (draft.variants || []).find((v) => v.id === draft.selected_variant_id);
            if (!selected) return;
            const inputs = Array.from(document.querySelectorAll("[data-seven-action-idx]"))
              .sort((a, b) => Number(a.dataset.sevenActionIdx) - Number(b.dataset.sevenActionIdx));
            const list = inputs
              .map((el, i) => {
                const text = String(el.value || "").trim();
                if (!text) return "";
                return `Day${i + 1}：${text}`;
              })
              .filter(Boolean);
            selected.canvas.seven_day_actions = list;
            saveUi(ui);
            return;
          }

          const listInput = e.target.closest("[data-list-key][data-list-idx]");
          if (listInput) {
            const draft = ensureDraft();
            const selected = (draft.variants || []).find((v) => v.id === draft.selected_variant_id);
            if (!selected) return;
            const key = listInput.dataset.listKey;
            const inputs = Array.from(document.querySelectorAll(`[data-list-key="${key}"][data-list-idx]`))
              .sort((a, b) => Number(a.dataset.listIdx) - Number(b.dataset.listIdx));
            const list = inputs.map((el) => String(el.value || "").trim()).filter(Boolean);
            selected.canvas[key] = list;
            saveUi(ui);
            return;
          }

          const riskInput = e.target.closest("[data-risk-idx][data-risk-field]");
          if (riskInput) {
            const draft = ensureDraft();
            const selected = (draft.variants || []).find((v) => v.id === draft.selected_variant_id);
            if (!selected) return;
            const riskEls = Array.from(document.querySelectorAll("[data-risk-idx][data-risk-field]"));
            const rows = new Map();
            riskEls.forEach((el) => {
              const idx = Number(el.dataset.riskIdx);
              const field = el.dataset.riskField;
              if (!rows.has(idx)) rows.set(idx, { risk: "", metric: "", mitigation: "" });
              rows.get(idx)[field] = String(el.value || "").trim();
            });
            const list = Array.from(rows.entries())
              .sort((a, b) => a[0] - b[0])
              .map(([, r]) => formatRiskLine(r))
              .filter(Boolean);
            selected.canvas.key_risks = list;
            saveUi(ui);
            return;
          }

          const costInput = e.target.closest("[data-cost-idx][data-cost-field]");
          if (costInput) {
            const draft = ensureDraft();
            const selected = (draft.variants || []).find((v) => v.id === draft.selected_variant_id);
            if (!selected) return;
            const costEls = Array.from(document.querySelectorAll("[data-cost-idx][data-cost-field]"));
            const rows = new Map();
            costEls.forEach((el) => {
              const idx = Number(el.dataset.costIdx);
              const field = el.dataset.costField;
              if (!rows.has(idx)) rows.set(idx, { item: "", amount: "", note: "" });
              rows.get(idx)[field] = String(el.value || "").trim();
            });
            const list = Array.from(rows.entries())
              .sort((a, b) => a[0] - b[0])
              .map(([, r]) => formatCostLine(r))
              .filter(Boolean);
            selected.canvas.cost_structure = list;
            saveUi(ui);

            // Update total label without full rerender
            const totalEl = document.getElementById("costTotal");
            if (totalEl) {
              const total = list.map(parseCostLine).reduce((acc, r) => {
                const n = Number(String(r.amount || "").replaceAll(",", "").trim());
                return acc + (Number.isFinite(n) ? n : 0);
              }, 0);
              totalEl.textContent = total > 0 ? `估算合计：${total.toLocaleString()}/月` : "估算合计：—";
            }
            return;
          }

          const moatInput = e.target.closest("[data-moat-idx][data-moat-field]");
          if (moatInput) {
            const draft = ensureDraft();
            const selected = (draft.variants || []).find((v) => v.id === draft.selected_variant_id);
            if (!selected) return;
            const moatEls = Array.from(document.querySelectorAll("[data-moat-idx][data-moat-field]"));
            const rows = new Map();
            moatEls.forEach((el) => {
              const idx = Number(el.dataset.moatIdx);
              const field = el.dataset.moatField;
              if (!rows.has(idx)) rows.set(idx, { type: "", asset: "", build: "" });
              rows.get(idx)[field] = String(el.value || "").trim();
            });
            const list = Array.from(rows.entries())
              .sort((a, b) => a[0] - b[0])
              .map(([, r]) => formatMoatLine(r))
              .filter(Boolean);
            selected.canvas.moat = list;
            saveUi(ui);
            return;
          }

          const canvasInput = e.target.closest("[data-canvas-key]");
          if (canvasInput) {
            const draft = ensureDraft();
            const selected = (draft.variants || []).find((v) => v.id === draft.selected_variant_id);
            if (!selected) return;
            const key = canvasInput.dataset.canvasKey;
            if (key === "seven_day_actions") return;
            const raw = canvasInput.value || "";
            selected.canvas[key] = raw.includes("\\n") ? raw.split(/\\n+/).map((s) => s.trim()).filter(Boolean) : raw.trim();
            saveUi(ui);
            return;
          }

          const bind = e.target.closest("[data-bind]");
          if (!bind) return;
          const key = bind.dataset.bind;
          updateDraft({ [key]: bind.value, variants: [], selected_variant_id: null, citations: { patterns: [], priors: [], cases: [], feedback: [] } });
        });

        window.addEventListener("hashchange", render);
        window.addEventListener("resize", () => { if (window.innerWidth > 860) setSidebarOpen(false); });
        document.addEventListener("keydown", (e) => {
          const key = String(e.key || "").toLowerCase();
          if (!e.shiftKey) return;
          if (!(e.ctrlKey || e.metaKey)) return;
          if (key !== "d") return;
          e.preventDefault();
          ui.developerMode = !ui.developerMode;
          saveUi(ui);
          toast(ui.developerMode ? "已开启开发者模式" : "已关闭开发者模式");
          render();
        });

        setSidebarOpen(!!ui.sidebarOpen);
        updateSidebarCounts();
        render();
      })();
    </script>
  </body>
</html>
